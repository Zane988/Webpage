<!DOCTYPE html>
<html lang="en">
 <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Gallery</title>

     <style>
        html { scroll-behavior: smooth; }
        * { -webkit-tap-highlight-color: transparent; image-rendering: optimizeQuality; text-rendering: optimizeLegibility; shape-rendering: optimizeSpeed; }
        a, button, .item { outline: none; }

        body {
            background: linear-gradient(180deg, #000000 20%, #0e0f13 60%);
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            color: white;
            padding: 40px;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 50%;
            margin-top: 10px;
            transform: translateX(-50%);
            border-radius: 15px;
            width: 95%;
            height: 70px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.1);
            z-index: 999;
        }
        
        .nav {
            height: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 40px;
            padding-left: 60px;
            border-radius: 15px;
            background: rgba(14, 14, 14, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .item { color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .item:hover { transform: scale(1.1); color: #bbb; }

        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background-image:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 140px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 180px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 25px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 40px);
            background-size: 20% 20%;
        }

        .music-row { margin-top: 110px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .music-nav-row { 
            margin-top: 10px;
            display: flex; 
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }

        @property --song-color {
            syntax: '<color>';
            inherits: true;
            initial-value: rgba(34, 34, 34, 1);
        }
        
        .box-music-bg {
            position: relative;
            width: 270px;
            height: 290px;
            border-radius: 15px;
            background: rgba(235, 235, 235, 0.095);
            border: 1px solid #858585;
            
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            padding: 20px;
            
            z-index: 1;
        }

        .box-music-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, var(--song-color) 100%);
            transition: opacity 0.8s ease, --song-color 1.5s ease-in-out;
            opacity: 0.3;
            z-index: -1;
            border-radius: 15px;
            
            background-size: 100% 200%; /* Make it twice as tall */
            animation: as 5s ease-in-out infinite alternate;
        }

        @keyframes as {
            from {
                background-position: 0% 50%;
            }
            to {
                background-position: 0% 90%;
            }
        }

        .box-music-bg.is-playing::after {
            opacity: 0.56;
        }

        .box-music-cover {
            width: 250px; 
            height: 220px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            background-image: url("no-image.png");
            background-color: #222;
            margin-bottom: 15px;
        }

        .box-music-cover img {
            
            width: 250px;
            height: 220px;
            object-fit: cover; 
            object-position: center; 
            border-radius: 15px;
        }

        .song-li-name { 
            margin: 10px 0 0 0;
            font-size: 13px; 
            font-weight: bold;
        }

        .song-li-author { 
            margin: 5px 0 0 0;
            font-size: 9px; 
            color: #aaa; 
        }

        @property --x1 { syntax: '<percentage>'; inherits: false; initial-value: 20%; }
        @property --y1 { syntax: '<percentage>'; inherits: false; initial-value: 30%; }
        @property --x2 { syntax: '<percentage>'; inherits: false; initial-value: 80%; }
        @property --y2 { syntax: '<percentage>'; inherits: false; initial-value: 20%; }
        @property --x3 { syntax: '<percentage>'; inherits: false; initial-value: 50%; }
        @property --y3 { syntax: '<percentage>'; inherits: false; initial-value: 80%; }

        @property --dynamic-color {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(100, 150, 200, 0.8);
        }

        .box-an-bg {
            width: 800px;
            height: 330px;
            border-radius: 15px;
            background: rgba(235, 235, 235, 0.08);
            border: 1px solid #858585;
            position: relative;

            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;

            background-image: 
                radial-gradient(ellipse at var(--x1) var(--y1), rgba(100, 100, 255, 0.07) 0%, transparent 80%),
                radial-gradient(ellipse at var(--x2) var(--y2), var(--dynamic-color) 0%, transparent 80%),
                radial-gradient(ellipse at var(--x3) var(--y3), rgba(100, 200, 255, 0.09) 0%, transparent 80%);

            transition: --dynamic-color 4s ease, --x1 4s ease, --y1 4s ease, --x2 4s ease, --y2 4s ease, --x3 4s ease, --y3 4s ease;
        }

        .marquee-container {
            width: 95%; 
            margin: 0 auto;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            height: 35px;
            top: -10px;
        }

        .song-name
        {
            margin: 0;
            white-space: nowrap;
            position: absolute;
            left: 0;
            width: max-content;
            font-size: 32px;
        }

        .song-author {
            margin: 0;
            white-space: nowrap;
            position: absolute;
            left: 0;
            width: max-content;
            color: #acacac;
        }

        .animate-marquee {
            will-change: transform;
            animation: marquee-bounce 6s ease-in-out infinite alternate;
        }
        
        @keyframes marquee-bounce {
            0% { 
                transform: translateX(0); 
            }
            100% { 
                transform: translateX(var(--bounce-dist)); 
            }
        }

        /* AAAAAAAAAAAAAAAAAAAA LERECA*/

        .box-lyric-bg {
            position: relative;
            width: 535px;
            height: 290px;
            border-radius: 15px;
            background: rgba(235, 235, 235, 0.095);
            border: 1px solid #858585;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 1;
            overflow: hidden; 
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.5s;
            max-height: 290px; 
        }

        .box-selection-bg {
            position: relative;
            width: 490px;
            height: 290px;
            border-radius: 15px;
            background: rgba(235, 235, 235, 0.095);
            border: 1px solid #858585;
            
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            padding: 20px;
            
            z-index: 1;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 30px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .box-title {
            margin: 0;
            font-size: 24px;
        }

        .minimize-btn {
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
            margin-right: 10px;
        }

        .minimize-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .lyric-scroll-area {
            margin-top: -20px;
            width: 100%;
            height: 220px;
            overflow-y: auto;
            padding: 20px 0;
            white-space: pre-line;
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;

            -webkit-mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 20%,
                black 80%,
                transparent 100%
            );
            mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 20%,
                black 80%,
                transparent 100%
            );

            scrollbar-width: none; 
        }
        .lyric-scroll-area::-webkit-scrollbar { display: none; }

        .box-lyric-bg.minimized {
            max-height: 60px; 
            padding-bottom: 0;
        }

        .lyric-scroll-area {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            text-align: center;
            transition: opacity 0.3s;
        }

        .box-lyric-bg.minimized .lyric-scroll-area {
            opacity: 0;
            pointer-events: none;
        }

        .progress-container { 
            width: 90%; 
            margin: 90px auto 0 auto; 
        }

        .time-stamps { 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px; color: #888; 
            margin-bottom: 5px; 
            
        }

        .progress-bar { 
            position:  relative;  
            width: 100%; 
            height: 4px; 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 2px; 
        }

        .progress-fill { 
            width: 0%; 
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); 
            height: 100%; 
            background: white; 
            border-radius: 2px;
        }

        .controls-wrapper {
            position: absolute;
            top: 245px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .side-btn { cursor: pointer; transition: 0.2s; opacity: 0.7; }
        .side-btn:hover { transform: scale(1.2); opacity: 1; }

        .play-icon {
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-icon svg { width: 40px; height: 40px; fill: rgb(68, 68, 68); }
        .play-icon:hover { transform: scale(1.1); background: #eee; }

        .progress-dot {
            position: absolute;
            top: 50%;
            left: 0%; 
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
            pointer-events: none;
            z-index: 10;
        }

        .progress-bar:hover .progress-dot {
            transform: translate(-50%, -50%) scale(1.3);
        }

        @media (max-width: 800px) {
            .nav { 
                padding-left: 20px; 
                gap: 20px; 
            }

            .music-row, 
            .music-nav-row { 
                flex-direction: column; 
                align-items: center; 
                gap: 20px;
                width: 100%;
                margin-top: 20px;
            }

            .box-music-bg{ 
                width: 95% !important;
                height: auto;
                min-height: 250px; 
                padding-bottom: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .box-lyric-bg{ 
                width: 95% !important;
                height: auto;
                padding-bottom: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .box-selection-bg { 
                width: 95% !important;
                height: auto;
                min-height: 250px; 
                padding-bottom: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .box-an-bg { 
                width: 105% !important;
                height: auto;
                min-height: 250px; 
                padding-bottom: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .progress-container 
            { 
                width: 90%; 
                margin: 40px auto 0 auto;
            }

            .controls-wrapper { 
                position: relative;
                top: 20px;
                transform: none; 
                left: 0;
                margin-top: 20px;
            }
            
            .song-name { margin-left: 0; text-align: center; font-size: 24px; }
            .song-author { margin-left: 0; text-align: center; }

            .box-music-bg h1 {
                align-self: flex-start !important; 
                margin: 0px 0 0px -25px !important;
                text-align: left !important;
            }
        }
     </style>
 </head>

 <body>
    <div id="music">
        <div class="nav-wrapper">
            <div class="nav">
                <a href="index.html" class="item">MAIN</a>
                <a href="gallery.html" class="item">GALLERY</a>
                <a href="#music" class="item">MUSIC</a>
            </div>
        </div>
        
        <div class="music-row">
            <div class="box-music-bg">
                <h1 style="margin: 0px 0 0px -100px; position: absolute; top: -50px; font-size: 32px;">
                    Music Player
                </h1>
                <div class="box-music-cover"></div>
                <p class="song-li-name" id="display-li-name">
                    Through the Years
                </p>
                <p class="song-li-author" id="display-li-author">Unknown Artist</p>
            </div>

            <div class="box-an-bg">
                <div class="marquee-container" style="margin-top: 30px;">
                    <h3 class="song-name" id="display-name">Through the Years</h3>
                </div>
                <div class="marquee-container">
                    <p class="song-author" id="display-author">Unknown Artist</p>
                </div>

                <div class="progress-container">
                    <div class="time-stamps">
                        <span id="curr-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-dot" id="progress-dot"></div>
                    </div>
                </div>

                <div class="controls-wrapper">
                    <div class="side-btn" onclick="prevSong()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6L19 18V6z"/></svg>
                    </div>

                    <div class="play-icon" id="play-trigger">
                        <svg id="play-svg" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>

                    <div class="side-btn" onclick="nextSong()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="music-nav-row">
            <div class="box-lyric-bg">
                <div class="box-header">
                    <h1 class="box-title">Lyrics</h1>
                    <div class="minimize-btn" onclick="toggleMinimize()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line> 
                        </svg>
                    </div>
                </div>
                <div class="lyric-scroll-area" id="lyric-content">
                    </div>
            </div>

            <div class="box-selection-bg">
            </div>
        </div>

        <div class="grid-bg"></div>
    </div>

    <script>
        const musicEngine = new Audio();

        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;

        const songNameEl = document.getElementById('display-name');
        const songAuthorEl = document.getElementById('display-author');

        const songNameLi = document.getElementById('display-li-name');
        const songAuthorLi = document.getElementById('display-li-author');

        const playBtn = document.getElementById('play-trigger');
        const playSvg = document.getElementById('play-svg');

        async function loadPlaylist() 
        {
            const response = await fetch('musics.json'); //so its a fetch huh
            const data = await response.json();
            playlist = data.musics;
            updatePlayer();
        }

        const coverEl = document.querySelector('.box-music-bg');

        function updatePlayer() 
        {
            if (playlist.length > 0) 
            {
                const song = playlist[currentIndex];

                songNameEl.innerText = song.name;
                songAuthorEl.innerText = song.author || "Unknown Artist";
                songNameLi.innerText = song.name;
                songAuthorLi.innerText = song.author || "Unknown Artist";

                if (song.color) {
                    coverEl.style.setProperty('--song-color', song.color);
                    updateGlowColor(song.color)
                } else {
                    coverEl.style.setProperty('--song-color', '#222');
                    updateGlowColor('#222')
                }

                const coverl = document.querySelector('.box-music-cover');

                if (song.icon) 
                {
                    coverl.style.backgroundImage = `url('${song.icon}.jpg')`;
                    coverl.style.backgroundSize = 'cover'; 
                    coverl.style.backgroundPosition = 'center';
                } 
                else 
                {
                    coverl.style.backgroundImage = `url('no-image.png')`;
                }

                handleMarquee(songNameEl);
                handleMarquee(songAuthorEl);
                
                musicEngine.src = song.file;
                document.getElementById('progress-fill').style.width = '0%';

                loadLyrics(song.lrc || null);
            }
        }

        function toggleMinimize() 
        {
            const lyricBox = document.querySelector('.box-lyric-bg');
            lyricBox.classList.toggle('minimized');
        }

        async function loadLyrics(url) 
        {
            if(!url)
            {
                document.getElementById('lyric-content').innerText = "\n\n\nNo lyrics provided.";
                document.getElementById('lyric-content').scrollTop = 0;
                return;
            }

            const res = await fetch(url);
            const text = await res.text();
            
            const notag = text.replace(/\[.*?\]/g, '').trim();
            
            document.getElementById('lyric-content').innerText = notag;
            document.getElementById('lyric-content').scrollTop = 0;
        }

        const box = document.querySelector('.box-an-bg');

        function hexToRGBA(hex, alpha) 
        {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function updateGlowColor(hexCode) 
        {
            const finalColor = hexToRGBA(hexCode, 0.078);
            box.style.setProperty('--dynamic-color', finalColor);
        }

        const mobileQuery = window.matchMedia("(max-width: 800px)");

        function handleMarquee(element) 
        {
            const container = element.parentElement;

            element.classList.remove('animate-marquee');
            element.style.transform = "translateX(0)";
            element.style.removeProperty('--bounce-dist');

            void element.offsetWidth;

            const style = getComputedStyle(container);
            const paddingLeft = parseFloat(style.paddingLeft);
            const paddingRight = parseFloat(style.paddingRight);

            const containerWidth = Math.floor(container.getBoundingClientRect().width);
            const textWidth = Math.ceil(element.getBoundingClientRect().width);

            //console.log(containerWidth)

            if (textWidth > containerWidth) 
            {
                const overflow = textWidth - containerWidth;
                console.log(overflow)

                element.style.setProperty('--bounce-dist', `-${overflow}px`);
                element.classList.add('animate-marquee');
            }
        }

        function nextSong() 
        {
            currentIndex = (currentIndex + 1) % playlist.length;
            updatePlayer();

            if (isPlaying) 
            {
                musicEngine.play();
                coverEl.classList.add('is-playing');
            }
        }

        function prevSong() 
        {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            updatePlayer();

            if (isPlaying) 
            {
                musicEngine.play();
                coverEl.classList.add('is-playing');
            }
        }
        loadPlaylist();

        playBtn.addEventListener('click', () => 
        {
            isPlaying = !isPlaying;
            
            if (isPlaying) 
            {
                playSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                musicEngine.play();
                coverEl.classList.add('is-playing');
            } 
            else 
            {
                playSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
                musicEngine.pause();
                coverEl.classList.remove('is-playing');
            }
        });

        musicEngine.addEventListener("timeupdate", (e) => {
            const p = (musicEngine.currentTime / musicEngine.duration) * 100;

            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = p + "%";

            const currTimeEl = document.getElementById('curr-time');
            currTimeEl.innerText = formatTime(musicEngine.currentTime);

            const totTimeEl = document.getElementById('total-time');
            totTimeEl.innerText = formatTime(musicEngine.duration);

            document.getElementById('progress-dot').style.left = p + "%";
            if(musicEngine.currentTime >= musicEngine.duration) 
            {
                playSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
                isPlaying = false;
                coverEl.classList.remove('is-playing');
            }
        })

        const progressBar = document.querySelector('.progress-bar');

        progressBar.addEventListener('mousemove', (e) => {
            if(e.buttons !== 1) return;

            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = musicEngine.duration;

            musicEngine.currentTime = (clickX / width) * duration;
        });

        function formatTime(s)
        {
            let min = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }

        // Grid Animation
        const grid = document.querySelector(".grid-bg");
        let x = 0, y = 0;
        function animate() {
            x += 0.12; y += 0.1;
            grid.style.backgroundPosition = `0 ${y}px,${x}px 0,0 ${y * 0.4}px,${x * 0.4}px 0`;
            requestAnimationFrame(animate);
        }
        animate();
        updatePlayer();

        function randomizeGradients() 
        {
            const box = document.querySelector('.box-an-bg');
        
            const x1 = Math.floor(Math.random() * 100);
            const y1 = Math.floor(Math.random() * 100);
            const x2 = Math.floor(Math.random() * 100);
            const y2 = Math.floor(Math.random() * 100);
            const x3 = Math.floor(Math.random() * 100);
            const y3 = Math.floor(Math.random() * 100);

            box.style.setProperty('--x1', `${x1}%`);
            box.style.setProperty('--y1', `${y1}%`);
            box.style.setProperty('--x2', `${x2}%`);
            box.style.setProperty('--y2', `${y2}%`);
            box.style.setProperty('--x3', `${x3}%`);
            box.style.setProperty('--y3', `${y3}%`);
        }
        randomizeGradients();

        setInterval(randomizeGradients, 1500);

        window.addEventListener('resize', () => {
            handleMarquee(songNameEl);
            handleMarquee(songAuthorEl);
        });
    </script>
 </body>
</html>

<!DOCTYPE html>
<html lang="en">
 <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Gallery</title>

     <style>
        html {
            scroll-behavior: smooth;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            image-rendering: optimizeQuality;
            text-rendering: optimizeLegibility;
            shape-rendering: optimizeSpeed;
        }

        a, button, .item {
            outline: none;
        }

        body {
            background: linear-gradient(180deg, #000000 20%, #0e0f13 60%);
            background-attachment: fixed; 
            min-height: 100vh;
            
            display: flex;
            flex-direction: column;
            align-items: center; 
            
            font-family: Arial, sans-serif;
            color: white;
            padding: 40px;
            margin: 0;
            overflow-x: hidden;
        }

        .nav-wrapper {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 70px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.9);
            z-index: 999;
        }
        
        .nav {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            justify-content: space-between;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            background: rgba(190, 190, 190, 0.09);
        }

        .header-format {
            position: absolute; 
            font-size: 28px;
            font-weight: 600;
            margin-left: 10%;
            padding-left: 50px;
            padding-top: 2px;
        }

        .nav-icon {
            height: 40px;
            width: auto;
            margin-left: 10%;
            cursor: pointer;
        }

        .nav-items {
            display: flex;
            margin-right: 10%;
            gap: 30px;
        }

        .nav-text {
            display: inline;
        }

        .nav-img {
            display: none;
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .nav-indicator {
            display: none;
        }

        .item { color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .item:hover { transform: scale(1.1); color: #bbb; }

        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;

            background-image:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 140px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 180px),

                repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 25px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 40px);  

            will-change: transform;
            background-size: 20% 20%;
        }

        .box-wrapper {
            position: relative; 
            margin-top: 50px;
            margin-bottom: 50px;
            
            width: 105%;
            transform: translateX(-50%);

            left: 50%;
            border-radius: 15px;
            
            border: 1px solid #858585;
            background: rgba(235, 235, 235, 0.045);

        }

        .img-format {
            display: block;
            width: 100%; 
            margin-bottom: 8px; 
            border-radius: 20px;
            break-inside: avoid; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
        }

        .img-format:active {
            filter: blur(3px);
        }

        .gallery-container {
            column-width: 250px;
            column-gap: 10px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .img-format:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 2px #fff;
        }

        .lightbox {
            display: flex;
            position: fixed;
            z-index: 2000;
            inset: 0;
            background-color: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            pointer-events: none;
            align-items: center;
            justify-content: center;
            transition: background-color 0.4s ease, backdrop-filter 0.4s ease;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 10px;
            opacity: 0;
            transform: scale(0.8) translateY(100px);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.3s cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        .lightbox.active {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .lightbox.active .lightbox-content {
            opacity: 1;
            transform: scale(1) translateY(0px);
        }

        @media (max-width: 800px) {
            .nav-wrapper {
                top: auto;
                bottom: 0;
                height: 70px;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                box-shadow: none;
            }

            .nav {
                background: linear-gradient(
                    to top,
                    rgba(0,0,0,1) 0%,
                    rgba(0,0,0,0.85) 25%,
                    rgba(0,0,0,0.6) 55%,
                    rgba(0,0,0,0.3) 80%,
                    transparent 100%
                );
                border-radius: 0;
                height: 100%;
                justify-content: center;
            }

            .header-format,
            .nav-icon {
                display: none;
            }

            .nav-text {
                display: none;
            }

            .nav-img {
                display: block;
                width: 32px;
                height: 32px;
                filter: brightness(0) invert(1);
            }

            .item {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .nav-items {
                width: 100%;
                justify-content: center;
                gap: 70px;
                margin: 0;
            }

            body {
                padding-bottom: 100px;
            }

            .nav-indicator {
                display: block;
                position: absolute;
                top: -12px;
                left: 50%;
                transform: translateX(-50%);
                width: 28px;
                height: 28px;

                animation: float1 4s ease-in-out infinite;

                transition: none;
                pointer-events: none;
            }

            @keyframes float1 {
                0% {
                    transform: translateY(0px) translateX(-50%);
                }
                50% {
                    transform: translateY(-8px) translateX(-50%);
                }
                100% {
                    transform: translateY(0px) translateX(-50%);
                }
            }

            /*AAAAAAAAAAAAAAAAAAAAAAAA*/

            .box-wrapper {
                width: 110%;
                margin-top: -15px;
                margin-bottom: 10px;
            }

            .gallery-container {
                column-count: 2; 
                column-width: 50px;
                column-gap: 10px;
                padding: 10px;
            }

            .img-format {
                margin-bottom: 10px;
            }
        }
     </style>
 </head>
 <body>
    <div id="gallery">
        <div class="nav-wrapper">
            <div class="nav">
                <p class="header-format">
                    Gallery
                </p>
                <img src="icon/favicon.ico" alt="Icon" class="nav-icon">

                <div class="nav-items">
                    <img src="icon/favicon.ico" class="nav-indicator">

                    <a href="index.html" class="item">
                        <span class="nav-text">MAIN</span>
                        <img src="icon/memories.png" class="nav-img">
                    </a>

                    <a href="#gallery" class="item">
                        <span class="nav-text">GALLERY</span>
                        <img src="icon/gallery.png" class="nav-img">
                    </a>

                    <a href="music.html" class="item">
                        <span class="nav-text">MUSIC</span>
                        <img src="icon/music.png" class="nav-img">
                    </a>
                </div>
            </div>
        </div>

        <div class="grid-bg"></div>

        <div class="box-wrapper">
            <div class="gallery-container">
                <img src="school_pic.jpg" alt="Gallery Image 1" class="img-format">
                <img src="SEAITT Days.jpg" alt="Gallery Image 2" class="img-format">
                <img src="vikings.jpg" alt="Gallery Image 3" class="img-format">
                <img src="ilovethisman.jpg" alt="Gallery Image 6" class="img-format">
                <img src="arcade.jpg" alt="Gallery Image 4" class="img-format">
                <img src="coster.jpg" alt="Gallery Image 5" class="img-format">
                <img src="pic tgether.jpg" alt="Gallery Image 6" class="img-format">
                <img src="before_disaster.jpg" alt="Gallery Image 7" class="img-format">
                <img src="grad.jpg" alt="Gallery Image 8" class="img-format">
                <img src="grad2.jpg" alt="Gallery Image 8" class="img-format">
                <img src="buldak.jpg" alt="Gallery Image 8" class="img-format">
                <img src="scl.jpg" alt="Gallery Image 8" class="img-format">
                <img src="a.jpg" alt="Gallery Image 8" class="img-format">
                <img src="s.jpg" alt="Gallery Image 8" class="img-format">
                <img src="pic_e.jpg" alt="Gallery Image 8" class="img-format">
                <img src="me.jpg" alt="Gallery Image 8" class="img-format">
            </div>
        </div>

        <div id="lightbox" class="lightbox">
            <img class="lightbox-content" id="big-img">
        </div>
    </div>

    <script>
        const grid = document.querySelector(".grid-bg");

        let x = 0;
        let y = 0;

        function animate() {
            x += 0.12;  // horizontal speed
            y += 0.1;  // vertical speed

            grid.style.backgroundPosition = `0 ${y}px,${x}px 0,0 ${y * 0.4}px,${x * 0.4}px 0`;
            requestAnimationFrame(animate);
        }

        animate();

        const lightbox = document.getElementById('lightbox');
        const bigImg = document.getElementById('big-img');
        const galleryImages = document.querySelectorAll('.img-format');

        galleryImages.forEach(image => {
            image.addEventListener('click', () => {
                bigImg.src = image.src; 
                lightbox.classList.add('active'); 
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>
 </body>
